# Configuration for the CRM Dashboard (Default)
[build]
  base = "artifacts/arkoo-crm-frontend"
  command = "pnpm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://arkoo-infra.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
